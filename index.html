<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Gemma 4 E2B — Offline Chat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0f0f0f;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 12px 20px;
    background: #1a1a1a;
    border-bottom: 1px solid #2a2a2a;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  header h1 {
    font-size: 16px;
    font-weight: 600;
    color: #fff;
  }
  header .badge {
    font-size: 11px;
    background: #2d5a27;
    color: #7ec97e;
    padding: 2px 8px;
    border-radius: 10px;
  }
  header .badge.loading {
    background: #5a4a27;
    color: #c9b97e;
  }
  header .badge.error {
    background: #5a2727;
    color: #c97e7e;
  }
  #status-text {
    font-size: 12px;
    color: #888;
    margin-left: auto;
  }
  #progress-bar {
    width: 100%;
    height: 3px;
    background: #1a1a1a;
    flex-shrink: 0;
  }
  #progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #4285f4, #34a853);
    transition: width 0.3s;
  }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .message {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 12px;
    line-height: 1.5;
    font-size: 14px;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .message.user {
    align-self: flex-end;
    background: #1a3a5c;
    color: #d0e4ff;
    border-bottom-right-radius: 4px;
  }
  .message.assistant {
    align-self: flex-start;
    background: #1e1e1e;
    color: #e0e0e0;
    border-bottom-left-radius: 4px;
    border: 1px solid #2a2a2a;
  }
  .message.system {
    align-self: center;
    background: transparent;
    color: #666;
    font-size: 12px;
    text-align: center;
    padding: 4px;
  }
  .message img {
    max-width: 100%;
    max-height: 300px;
    border-radius: 8px;
    margin-bottom: 8px;
    display: block;
  }
  .message audio {
    display: block;
    margin-bottom: 8px;
    max-width: 100%;
  }
  #input-area {
    padding: 12px 20px;
    background: #1a1a1a;
    border-top: 1px solid #2a2a2a;
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex-shrink: 0;
  }
  #attachments {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  #attachments:empty { display: none; }
  .attachment-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #2a2a2a;
    border: 1px solid #3a3a3a;
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 12px;
    color: #ccc;
  }
  .attachment-chip img {
    width: 32px;
    height: 32px;
    object-fit: cover;
    border-radius: 4px;
  }
  .attachment-chip .remove {
    cursor: pointer;
    color: #888;
    font-size: 14px;
    line-height: 1;
    padding: 0 2px;
  }
  .attachment-chip .remove:hover { color: #c97e7e; }
  #input-row {
    display: flex;
    gap: 8px;
  }
  #input {
    flex: 1;
    padding: 10px 14px;
    background: #0f0f0f;
    border: 1px solid #333;
    border-radius: 8px;
    color: #e0e0e0;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    min-height: 42px;
    max-height: 120px;
  }
  #input:focus { border-color: #4285f4; }
  #input:disabled { opacity: 0.5; }
  button {
    padding: 10px 20px;
    background: #4285f4;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
  }
  button:hover { background: #3275e4; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  #clear-btn {
    background: #333;
    color: #aaa;
    padding: 10px 14px;
  }
  #clear-btn:hover { background: #444; }
  #attach-btn {
    background: #333;
    color: #aaa;
    padding: 10px 14px;
    font-size: 16px;
  }
  #attach-btn:hover { background: #444; }
  #webgpu-error {
    display: none;
    text-align: center;
    padding: 40px 20px;
    color: #c97e7e;
    font-size: 14px;
    line-height: 1.6;
  }
  #drop-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(66, 133, 244, 0.15);
    border: 3px dashed #4285f4;
    z-index: 100;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: #4285f4;
    pointer-events: none;
  }
  #drop-overlay.visible {
    display: flex;
  }
</style>
</head>
<body>

<header>
  <h1>Gemma 4 E2B</h1>
  <span id="badge" class="badge loading">loading</span>
  <span id="status-text">Checking WebGPU...</span>
</header>
<div id="progress-bar"><div id="progress-fill"></div></div>

<div id="webgpu-error">
  <p><strong>WebGPU is not available in this browser.</strong></p>
  <p>You need Chrome 113+ or Edge 113+ with WebGPU enabled.</p>
  <p style="margin-top:12px;color:#888;">chrome://flags → #enable-unsafe-webgpu → Enabled</p>
</div>

<div id="drop-overlay">Drop image or audio file here</div>

<div id="chat"></div>

<div id="input-area">
  <div id="attachments"></div>
  <div id="input-row">
    <button id="clear-btn" onclick="clearChat()" title="Clear chat">Clear</button>
    <button id="attach-btn" onclick="document.getElementById('file-input').click()" title="Attach image or audio">+</button>
    <input type="file" id="file-input" accept="image/*,audio/*" multiple hidden>
    <textarea id="input" rows="1" placeholder="Type a message, paste or drop an image/audio..." disabled
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"
      oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
    <button id="send-btn" onclick="send()" disabled>Send</button>
  </div>
</div>

<script type="module">
import {
  AutoProcessor,
  Gemma4ForConditionalGeneration,
  TextStreamer,
  RawImage,
} from "https://cdn.jsdelivr.net/npm/@huggingface/transformers@4.0.1/dist/transformers.min.js";

const MODEL_ID = "onnx-community/gemma-4-E2B-it-ONNX";

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const sendBtn = document.getElementById("send-btn");
const badge = document.getElementById("badge");
const statusText = document.getElementById("status-text");
const progressFill = document.getElementById("progress-fill");
const webgpuError = document.getElementById("webgpu-error");
const attachmentsDiv = document.getElementById("attachments");
const fileInput = document.getElementById("file-input");
const dropOverlay = document.getElementById("drop-overlay");

let processor = null;
let model = null;
let generating = false;
let conversationHistory = [];
let pendingAttachments = []; // { type: "image"|"audio", file: File, url: string }

// --- Attachment handling ---

function addAttachment(file) {
  const isImage = file.type.startsWith("image/");
  const isAudio = file.type.startsWith("audio/");
  if (!isImage && !isAudio) return;

  const url = URL.createObjectURL(file);
  const attachment = { type: isImage ? "image" : "audio", file, url };
  pendingAttachments.push(attachment);
  renderAttachments();
}

function removeAttachment(index) {
  URL.revokeObjectURL(pendingAttachments[index].url);
  pendingAttachments.splice(index, 1);
  renderAttachments();
}

function renderAttachments() {
  attachmentsDiv.innerHTML = "";
  pendingAttachments.forEach((att, i) => {
    const chip = document.createElement("div");
    chip.className = "attachment-chip";
    if (att.type === "image") {
      const img = document.createElement("img");
      img.src = att.url;
      chip.appendChild(img);
    } else {
      chip.insertAdjacentHTML("beforeend", '<span style="font-size:16px">&#127925;</span>');
    }
    const name = document.createElement("span");
    name.textContent = att.file.name.length > 20 ? att.file.name.slice(0, 17) + "..." : att.file.name;
    chip.appendChild(name);
    const remove = document.createElement("span");
    remove.className = "remove";
    remove.textContent = "\u00d7";
    remove.onclick = () => removeAttachment(i);
    chip.appendChild(remove);
    attachmentsDiv.appendChild(chip);
  });
}

// File input
fileInput.addEventListener("change", () => {
  for (const f of fileInput.files) addAttachment(f);
  fileInput.value = "";
});

// Drag and drop
let dragCounter = 0;
document.addEventListener("dragenter", (e) => {
  e.preventDefault();
  dragCounter++;
  dropOverlay.classList.add("visible");
});
document.addEventListener("dragleave", (e) => {
  e.preventDefault();
  dragCounter--;
  if (dragCounter <= 0) { dragCounter = 0; dropOverlay.classList.remove("visible"); }
});
document.addEventListener("dragover", (e) => e.preventDefault());
document.addEventListener("drop", (e) => {
  e.preventDefault();
  dragCounter = 0;
  dropOverlay.classList.remove("visible");
  for (const f of e.dataTransfer.files) addAttachment(f);
});

// Paste
document.addEventListener("paste", (e) => {
  for (const item of e.clipboardData.items) {
    if (item.type.startsWith("image/") || item.type.startsWith("audio/")) {
      const file = item.getAsFile();
      if (file) addAttachment(file);
    }
  }
});

// --- Chat UI ---

function addMessage(role, text, mediaElements) {
  const div = document.createElement("div");
  div.className = `message ${role}`;
  if (mediaElements) {
    for (const el of mediaElements) div.appendChild(el);
  }
  const span = document.createElement("span");
  if (text) span.textContent = text;
  div.appendChild(span);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function setStatus(text, state) {
  statusText.textContent = text;
  badge.className = `badge ${state || ""}`;
  badge.textContent = state === "loading" ? "loading" : state === "error" ? "error" : "ready";
}

async function checkWebGPU() {
  if (!navigator.gpu) return false;
  try {
    const adapter = await navigator.gpu.requestAdapter();
    return !!adapter;
  } catch { return false; }
}

async function loadModel() {
  const hasWebGPU = await checkWebGPU();
  if (!hasWebGPU) {
    webgpuError.style.display = "block";
    chat.style.display = "none";
    document.getElementById("input-area").style.display = "none";
    setStatus("WebGPU not available", "error");
    return;
  }

  setStatus("Loading processor...", "loading");

  try {
    processor = await AutoProcessor.from_pretrained(MODEL_ID);

    setStatus("Loading model weights (~1.5 GB)...", "loading");
    const fileProgress = {};
    let totalBytes = 0;
    let loadedBytes = 0;
    let fileCount = 0;
    let doneCount = 0;
    let currentFile = null;

    model = await Gemma4ForConditionalGeneration.from_pretrained(MODEL_ID, {
      dtype: "q4f16",
      device: "webgpu",
      progress_callback: (info) => {
        if (info.status === "initiate" && info.file) {
          currentFile = info.file.split("/").pop();
          fileCount++;
        }
        if (info.status === "progress" && info.file) {
          const prev = fileProgress[info.file] || { loaded: 0, total: info.total || 0 };
          loadedBytes += (info.loaded - prev.loaded);
          if (prev.total === 0 && info.total) totalBytes += info.total;
          fileProgress[info.file] = { loaded: info.loaded, total: info.total || 0 };
          const mb = (loadedBytes / 1e6).toFixed(0);
          const totalMb = totalBytes > 0 ? ` / ${(totalBytes / 1e6).toFixed(0)} MB` : "";
          const pct = totalBytes > 0 ? Math.round((loadedBytes / totalBytes) * 100) : 0;
          progressFill.style.width = (totalBytes > 0 ? pct : 50) + "%";
          const fname = currentFile || info.file.split("/").pop();
          setStatus(`Downloading: ${mb}${totalMb} MB — ${fname} (file ${doneCount + 1}/${fileCount})`, "loading");
        }
        if (info.status === "done" && info.file) {
          doneCount++;
          currentFile = null;
        }
      },
    });

    setStatus("Ready — fully offline", "");
    progressFill.style.width = "0%";
    input.disabled = false;
    sendBtn.disabled = false;
    input.focus();

    addMessage("system", "Model loaded. Everything runs locally — no data leaves your machine. You can attach images and audio via the + button, drag-and-drop, or paste.");
  } catch (err) {
    console.error(err);
    setStatus("Failed to load model", "error");
    addMessage("system", "Error loading model: " + err.message);
  }
}

// --- File to model input helpers ---

async function fileToRawImage(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      canvas.width = img.width;
      canvas.height = img.height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0);
      const imageData = ctx.getImageData(0, 0, img.width, img.height);
      const rawImage = new RawImage(imageData.data, img.width, img.height, 4);
      URL.revokeObjectURL(img.src);
      resolve(rawImage);
    };
    img.onerror = reject;
    img.src = URL.createObjectURL(file);
  });
}

async function fileToAudioData(file) {
  const arrayBuffer = await file.arrayBuffer();
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
  const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
  const float32 = audioBuffer.getChannelData(0); // mono
  await audioCtx.close();
  return float32;
}

// --- Generation ---

async function generate(userText, attachments) {
  if (!model || !processor || generating) return;
  generating = true;
  sendBtn.disabled = true;
  input.disabled = true;

  // Build content array — media before text (as recommended)
  const content = [];
  const images = [];
  const audios = [];

  for (const att of attachments) {
    if (att.type === "image") {
      content.push({ type: "image" });
      images.push(await fileToRawImage(att.file));
    } else {
      content.push({ type: "audio" });
      audios.push(await fileToAudioData(att.file));
    }
  }
  content.push({ type: "text", text: userText || "Describe this." });

  conversationHistory.push({ role: "user", content });

  const prompt = processor.apply_chat_template(conversationHistory, {
    enable_thinking: false,
    add_generation_prompt: true,
  });

  // Build processor call: processor(prompt, images?, audio?, options?)
  // Images: pass single RawImage or null. Audio: pass single Float32Array or null.
  let inputs;
  const image = images.length > 0 ? images[0] : null;
  const audio = audios.length > 0 ? audios[0] : null;
  if (!image && !audio) {
    inputs = await processor(prompt);
  } else if (image && !audio) {
    inputs = await processor(prompt, image, { add_special_tokens: false });
  } else if (!image && audio) {
    inputs = await processor(prompt, null, audio, { add_special_tokens: false });
  } else {
    inputs = await processor(prompt, image, audio, { add_special_tokens: false });
  }
  const assistantDiv = addMessage("assistant", "");
  const textNode = assistantDiv.querySelector("span");
  let fullText = "";
  const startTime = performance.now();
  let tokenCount = 0;

  const streamer = new TextStreamer(processor.tokenizer, {
    skip_prompt: true,
    skip_special_tokens: true,
    callback_function: (text) => {
      fullText += text;
      tokenCount++;
      textNode.textContent = fullText;
      chat.scrollTop = chat.scrollHeight;
    },
  });

  try {
    await model.generate({
      ...inputs,
      max_new_tokens: 1024,
      do_sample: false,
      streamer,
    });

    const elapsed = (performance.now() - startTime) / 1000;
    const tps = (tokenCount / elapsed).toFixed(1);
    setStatus(`${tokenCount} tokens in ${elapsed.toFixed(1)}s (${tps} tok/s)`, "");

    conversationHistory.push({
      role: "assistant",
      content: [{ type: "text", text: fullText }],
    });
  } catch (err) {
    console.error(err);
    textNode.textContent = "Error: " + err.message;
    assistantDiv.style.color = "#c97e7e";
    conversationHistory.pop();
  }

  generating = false;
  sendBtn.disabled = false;
  input.disabled = false;
  input.focus();
}

window.send = function () {
  const text = input.value.trim();
  if ((!text && pendingAttachments.length === 0) || generating) return;
  input.value = "";
  input.style.height = "auto";

  // Build media elements for the user message bubble
  const mediaEls = [];
  for (const att of pendingAttachments) {
    if (att.type === "image") {
      const img = document.createElement("img");
      img.src = att.url;
      mediaEls.push(img);
    } else {
      const audio = document.createElement("audio");
      audio.controls = true;
      audio.src = att.url;
      mediaEls.push(audio);
    }
  }

  addMessage("user", text, mediaEls.length > 0 ? mediaEls : null);

  const atts = [...pendingAttachments];
  pendingAttachments = [];
  renderAttachments();

  generate(text, atts);
};

window.clearChat = function () {
  conversationHistory = [];
  pendingAttachments = [];
  renderAttachments();
  chat.innerHTML = "";
  addMessage("system", "Chat cleared. Model is still loaded — no re-download needed.");
};

loadModel();
</script>
</body>
</html>
