<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>BitNet b1.58 2B — Offline Chat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0f0f0f;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 12px 20px;
    background: #1a1a1a;
    border-bottom: 1px solid #2a2a2a;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  header h1 {
    font-size: 16px;
    font-weight: 600;
    color: #fff;
  }
  header .badge {
    font-size: 11px;
    background: #2d5a27;
    color: #7ec97e;
    padding: 2px 8px;
    border-radius: 10px;
  }
  header .badge.loading {
    background: #5a4a27;
    color: #c9b97e;
  }
  header .badge.error {
    background: #5a2727;
    color: #c97e7e;
  }
  #status-text {
    font-size: 12px;
    color: #888;
    margin-left: auto;
  }
  #progress-bar {
    width: 100%;
    height: 3px;
    background: #1a1a1a;
    flex-shrink: 0;
  }
  #progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #0078d4, #50e6ff);
    transition: width 0.3s;
  }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .message {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 12px;
    line-height: 1.5;
    font-size: 14px;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .message.user {
    align-self: flex-end;
    background: #1a3a5c;
    color: #d0e4ff;
    border-bottom-right-radius: 4px;
  }
  .message.assistant {
    align-self: flex-start;
    background: #1e1e1e;
    color: #e0e0e0;
    border-bottom-left-radius: 4px;
    border: 1px solid #2a2a2a;
  }
  .message.system {
    align-self: center;
    background: transparent;
    color: #666;
    font-size: 12px;
    text-align: center;
    padding: 4px;
  }
  #input-area {
    padding: 12px 20px;
    background: #1a1a1a;
    border-top: 1px solid #2a2a2a;
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  #input {
    flex: 1;
    padding: 10px 14px;
    background: #0f0f0f;
    border: 1px solid #333;
    border-radius: 8px;
    color: #e0e0e0;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    min-height: 42px;
    max-height: 120px;
  }
  #input:focus { border-color: #0078d4; }
  #input:disabled { opacity: 0.5; }
  button {
    padding: 10px 20px;
    background: #0078d4;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
  }
  button:hover { background: #106ebe; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  #clear-btn {
    background: #333;
    color: #aaa;
    padding: 10px 14px;
  }
  #clear-btn:hover { background: #444; }
  #webgpu-error {
    display: none;
    text-align: center;
    padding: 40px 20px;
    color: #c97e7e;
    font-size: 14px;
    line-height: 1.6;
  }
</style>
</head>
<body>

<header>
  <h1>BitNet b1.58 2B</h1>
  <span id="badge" class="badge loading">loading</span>
  <span id="status-text">Checking WebGPU...</span>
</header>
<div id="progress-bar"><div id="progress-fill"></div></div>

<div id="webgpu-error">
  <p><strong>WebGPU is not available in this browser.</strong></p>
  <p>You need Chrome 113+, Edge 113+, or Safari 18+ with WebGPU enabled.</p>
</div>

<div id="chat"></div>

<div id="input-area">
  <button id="clear-btn" onclick="clearChat()" title="Clear chat">Clear</button>
  <textarea id="input" rows="1" placeholder="Type a message..." disabled
    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"
    oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
  <button id="send-btn" onclick="send()" disabled>Send</button>
</div>

<script type="module">
import { BitNet } from "https://cdn.jsdelivr.net/npm/0xbitnet/dist/index.js";

const MODEL_URL = "https://huggingface.co/microsoft/bitnet-b1.58-2B-4T-gguf/resolve/main/ggml-model-i2_s.gguf";

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const sendBtn = document.getElementById("send-btn");
const badge = document.getElementById("badge");
const statusText = document.getElementById("status-text");
const progressFill = document.getElementById("progress-fill");
const webgpuError = document.getElementById("webgpu-error");

let model = null;
let generating = false;
let conversationHistory = [];

function addMessage(role, text) {
  const div = document.createElement("div");
  div.className = `message ${role}`;
  const span = document.createElement("span");
  if (text) span.textContent = text;
  div.appendChild(span);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function setStatus(text, state) {
  statusText.textContent = text;
  badge.className = `badge ${state || ""}`;
  badge.textContent = state === "loading" ? "loading" : state === "error" ? "error" : "ready";
}

async function checkWebGPU() {
  if (!navigator.gpu) return false;
  try {
    const adapter = await navigator.gpu.requestAdapter();
    return !!adapter;
  } catch { return false; }
}

async function loadModel() {
  const hasWebGPU = await checkWebGPU();
  if (!hasWebGPU) {
    webgpuError.style.display = "block";
    chat.style.display = "none";
    document.getElementById("input-area").style.display = "none";
    setStatus("WebGPU not available", "error");
    return;
  }

  setStatus("Loading BitNet model (~500 MB)...", "loading");

  try {
    model = await BitNet.load(MODEL_URL, {
      onProgress: (p) => {
        const pct = Math.round(p.fraction * 100);
        progressFill.style.width = pct + "%";
        const phase = p.phase || "downloading";
        setStatus(`${phase}: ${pct}%`, "loading");
      },
    });

    setStatus("Ready — fully offline, 1-bit inference", "");
    progressFill.style.width = "0%";
    input.disabled = false;
    sendBtn.disabled = false;
    input.focus();

    addMessage("system", "Model loaded. Microsoft BitNet b1.58 (2B params, 1-bit weights) running entirely in your browser via WebGPU. Text only — no image/audio support.");
  } catch (err) {
    console.error(err);
    setStatus("Failed to load model", "error");
    addMessage("system", "Error loading model: " + err.message);
  }
}

function buildPrompt() {
  // LLaMA 3 chat template (BitNet uses this format)
  let prompt = "<|begin_of_text|>";
  prompt += "<|start_header_id|>system<|end_header_id|>\n\nYou are a helpful assistant.<|eot_id|>";
  for (const msg of conversationHistory) {
    prompt += `<|start_header_id|>${msg.role}<|end_header_id|>\n\n${msg.content}<|eot_id|>`;
  }
  prompt += "<|start_header_id|>assistant<|end_header_id|>\n\n";
  return prompt;
}

async function generate(userText) {
  if (!model || generating) return;
  generating = true;
  sendBtn.disabled = true;
  input.disabled = true;

  conversationHistory.push({ role: "user", content: userText });

  const prompt = buildPrompt();
  const assistantDiv = addMessage("assistant", "");
  const textNode = assistantDiv.querySelector("span");
  let fullText = "";
  const startTime = performance.now();
  let tokenCount = 0;

  try {
    for await (const token of model.generate(prompt, {
      max_tokens: 1024,
      temperature: 0.7,
      stop: ["<|eot_id|>", "<|end_of_text|>"],
    })) {
      fullText += token;
      tokenCount++;
      textNode.textContent = fullText;
      chat.scrollTop = chat.scrollHeight;
    }

    const elapsed = (performance.now() - startTime) / 1000;
    const tps = (tokenCount / elapsed).toFixed(1);
    setStatus(`${tokenCount} tokens in ${elapsed.toFixed(1)}s (${tps} tok/s)`, "");

    conversationHistory.push({ role: "assistant", content: fullText });
  } catch (err) {
    console.error(err);
    textNode.textContent = "Error: " + err.message;
    assistantDiv.style.color = "#c97e7e";
    conversationHistory.pop();
  }

  generating = false;
  sendBtn.disabled = false;
  input.disabled = false;
  input.focus();
}

window.send = function () {
  const text = input.value.trim();
  if (!text || generating) return;
  input.value = "";
  input.style.height = "auto";
  addMessage("user", text);
  generate(text);
};

window.clearChat = function () {
  conversationHistory = [];
  chat.innerHTML = "";
  addMessage("system", "Chat cleared. Model is still loaded — no re-download needed.");
};

loadModel();
</script>
</body>
</html>
